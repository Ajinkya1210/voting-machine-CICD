apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-app-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voting-app
  template:
    metadata:
      labels:
        app: voting-app
    spec:
      containers:
      - name: voting-app-container
        image: your-dockerhub-username/voting-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: voting-app-service
spec:
  type: LoadBalancer
  ports:
  - port: 80        # This is what you type in the browser
    targetPort: 3000 # This MUST match what Node.js uses (3000)
  selector:
    app: voting-app